<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#16A34A"/>
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Truck body -->
    <rect x="8" y="28" width="30" height="18" rx="3" fill="white" fill-opacity="0.9" stroke="none"/>
    <!-- Cab -->
    <rect x="36" y="22" width="18" height="24" rx="4" fill="white" fill-opacity="0.9" stroke="none"/>
    <!-- Windshield -->
    <rect x="38" y="25" width="14" height="10" rx="3" fill="#16A34A" fill-opacity="0.7" stroke="none"/>
    <!-- Wheels -->
    <circle cx="18" cy="47" r="5" fill="#16A34A" stroke="white" stroke-width="2"/>
    <circle cx="38" cy="47" r="5" fill="#16A34A" stroke="white" stroke-width="2"/>
    <circle cx="50" cy="47" r="5" fill="#16A34A" stroke="white" stroke-width="2"/>
    <!-- Boom arm -->
    <line x1="8" y1="32" x2="2" y2="24" stroke="white" stroke-width="3"/>
    <!-- Light bar -->
    <rect x="39" y="20" width="8" height="3" rx="1.5" fill="#EF4444" stroke="none"/>
    <rect x="49" y="20" width="6" height="3" rx="1.5" fill="#FBBF24" stroke="none"/>
  </g>
</svg>
